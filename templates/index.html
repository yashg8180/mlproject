<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* Centering content */
        body {
            background: linear-gradient(to right, #56ccf2, #2f80ed);
            color: white;
            text-align: center;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        /* Styling the button */
        .btn-custom {
            background-color: #ff6f61;
            color: white;
            padding: 15px 25px;
            font-size: 20px;
            border-radius: 10px;
            text-decoration: none;
            transition: 0.3s;
            border: none;
        }

        .btn-custom:hover {
            background-color: #e63946;
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <h1>Welcome to the Home Page</h1>
    
    <!-- Button to redirect to /predictdata -->
    <a href="{{ url_for('predict_datapoint') }}" class="btn btn-custom">Go to Prediction Page</a>

</body>
</html>
